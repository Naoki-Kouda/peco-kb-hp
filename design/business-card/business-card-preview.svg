  <text x="920" y="591" fill="#647084" font-family="Arial,sans-serif" font-size="15" font-weight="700" letter-spacing="3">BACK</text>
  <text x="190" y="1065" fill="#647084" font-family="'Noto Sans JP','Yu Gothic',Meiryo,Arial,sans-serif" font-size="16">91 × 55 mm / Navy · White · Orange / Peco&amp;Kb brand system</text>
