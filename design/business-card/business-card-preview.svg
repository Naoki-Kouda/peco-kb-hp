<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120" role="img" aria-labelledby="title desc">
  <title id="title">株式会社Peco&amp;Kb 名刺デザインプレビュー</title>
  <desc id="desc">表面と裏面を並べた名刺デザインのプレビュー</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="170%">
      <feDropShadow dx="0" dy="24" stdDeviation="25" flood-color="#07101f" flood-opacity="0.18"/>
    </filter>
    <linearGradient id="frontBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07101f"/>
      <stop offset="0.58" stop-color="#101a33"/>
      <stop offset="1" stop-color="#143c73"/>
    </linearGradient>
    <radialGradient id="frontGlow" cx="0.82" cy="0.3" r="0.72">
      <stop offset="0" stop-color="#ff6533" stop-opacity="0.24"/>
      <stop offset="0.42" stop-color="#347df4" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#07101f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="backCorner" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#143c73" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#143c73" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="previewPhotoClip">
      <rect x="655" y="38" width="205" height="292" rx="12"/>
    </clipPath>
    <filter id="previewMonoPhoto" color-interpolation-filters="sRGB">
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncR type="linear" slope="1.08" intercept="-0.03"/>
        <feFuncG type="linear" slope="1.08" intercept="-0.03"/>
        <feFuncB type="linear" slope="1.08" intercept="-0.03"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1600" height="1120" fill="#eef1f5"/>
  <text x="190" y="90" fill="#647084" font-family="Arial,sans-serif" font-size="20" font-weight="700" letter-spacing="4">BUSINESS CARD CONCEPT 01</text>

  <g transform="translate(0,-18) scale(0.61)" filter="url(#shadow)">
    <rect x="190" y="145" width="1220" height="738" rx="18" fill="url(#frontBg)"/>
    <rect x="190" y="145" width="1220" height="738" rx="18" fill="url(#frontGlow)"/>
    <g transform="translate(190 145) scale(1.340659 1.341818)">
      <g fill="none" stroke="#7ea8dc" stroke-opacity="0.15" stroke-width="1.5">
        <path d="M536 88 635 145 719 82 818 158"/>
        <path d="M514 210 617 171 711 235 832 194"/>
        <path d="M559 322 649 262 750 316 849 270"/>
        <path d="M613 430 682 351 789 405 870 344"/>
        <path d="M635 145 617 171 649 262 559 322"/>
        <path d="M719 82 711 235 750 316 682 351"/>
        <path d="M818 158 832 194 849 270 789 405"/>
      </g>
      <g fill="#7ea8dc" fill-opacity="0.34">
