      <circle cx="711" cy="235" r="5" fill="#ff6533"/>
      <g font-family="'Noto Sans JP','Yu Gothic',Meiryo,Arial,sans-serif">
        <text x="70" y="104" fill="#ffffff" font-size="46" font-weight="900" letter-spacing="-2">PECO<tspan fill="#ff6533">&amp;</tspan>KB</text>
        <text x="72" y="139" fill="#aab7ca" font-size="13" font-weight="700" letter-spacing="3.4">AI DEVELOPMENT COMPANY</text>
        <rect x="70" y="221" width="52" height="5" rx="2.5" fill="#ff6533"/>
        <text x="70" y="294" fill="#ffffff" font-size="46" font-weight="800" letter-spacing="-1.5">AIを現場の力に</text>
        <text x="72" y="438" fill="#c2ccda" font-size="15" font-weight="700" letter-spacing="1.6">AI DEVELOPMENT  /  BUSINESS SYSTEMS  /  OWN PRODUCTS</text>
        <text x="72" y="481" fill="#ffffff" fill-opacity="0.62" font-size="14" font-weight="600">株式会社Peco&amp;Kb</text>
