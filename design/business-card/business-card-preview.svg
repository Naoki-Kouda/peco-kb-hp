        <circle cx="818" cy="158" r="5"/><circle cx="514" cy="210" r="4"/><circle cx="617" cy="171" r="4"/>
        <circle cx="711" cy="235" r="5"/><circle cx="832" cy="194" r="4"/><circle cx="559" cy="322" r="4"/>
        <circle cx="649" cy="262" r="4"/><circle cx="750" cy="316" r="5"/><circle cx="849" cy="270" r="4"/>
